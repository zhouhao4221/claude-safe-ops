# Credentials configuration example
# Copy this file to credentials.yaml and fill in actual values
# Important: credentials.yaml is in .gitignore and will not be committed
# Important: Ensure file permissions are set to 600 (chmod 600 credentials.yaml)

# Default auth method: key | password | agent
default_auth_method: key

# SSH key authentication
ssh:
  private_key_path: ~/.ssh/id_ed25519
  # Leave blank for interactive input at runtime
  passphrase:

# Password authentication (not recommended, prefer interactive input)
# password:
#   username: ops
#   password:  # Leave blank = prompted at runtime

# Database credentials
# database:
#   mysql:
#     username: admin
#     password:  # Leave blank = prompted at runtime
